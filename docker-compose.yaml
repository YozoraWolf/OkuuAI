services:
  redis:
    image: redis/redis-stack:latest
    container_name: okuuai_redis
    ports:
      - "${REDIS_PORT:-6009}:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PWD:-admin1234}", "--loadmodule", "/opt/redis-stack/lib/redisearch.so"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PWD:-admin1234}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: okuuai_ollama
    profiles:
      - local-llm
    environment:
      - OLLAMA_HOST=0.0.0.0
    ports:
      - "${OLLAMA_PORT:-7009}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  redis_data:
  ollama_data:
