services:
  redis:
    image: redis/redis-stack:latest
    container_name: okuuai_redis
    ports:
      - "${REDIS_PORT:-6009}:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PWD:-admin1234}", "--loadmodule", "/opt/redis-stack/lib/redisearch.so"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PWD:-admin1234}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: okuuai_ollama
    profiles:
      - local-llm
    environment:
      - OLLAMA_HOST=0.0.0.0
    ports:
      - "${OLLAMA_PORT:-7009}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: .
    profiles:
      - app
    env_file:
      - .env
    environment:
      PORT: 3009
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LLM_BASE_URL: ${DOCKER_LLM_BASE_URL:-http://host.docker.internal:8080/v1}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./assistant.json:/app/assistant.json
      - ./session.json:/app/session.json
      - ./system.json:/app/system.json
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3009/status').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  frontend:
    build:
      context: ./src-site/okuu-control-center
    profiles:
      - app
    ports:
      - "${FRONTEND_PORT:-9000}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  ollama_data:
